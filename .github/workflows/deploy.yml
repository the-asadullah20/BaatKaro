name: Deploy to Google Cloud Run
#hahah#
on:
  push:
    branches:
      - main

env:
  PROJECT_ID: baatkaro-app-99
  REGION: us-central1

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.save-backend-url.outputs.backend_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Backend Docker Image
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/baatkaro-backend:latest ./backend
          docker push gcr.io/${{ env.PROJECT_ID }}/baatkaro-backend:latest

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy baatkaro-backend \
            --image gcr.io/${{ env.PROJECT_ID }}/baatkaro-backend:latest \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8080 \
            --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},MONGODB_URI=${{ secrets.MONGODB_URI }},JWT_SECRET=${{ secrets.JWT_SECRET }},DB_NAME=baatkaro,LANGFUSE_PUBLIC_KEY=${{ secrets.LANGFUSE_PUBLIC_KEY }},LANGFUSE_SECRET_KEY=${{ secrets.LANGFUSE_SECRET_KEY }},LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }}

      - name: Extract backend URL
        id: save-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe baatkaro-backend --region ${{ env.REGION }} --format 'value(status.url)')
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    name: Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud
        run: gcloud auth configure-docker --quiet

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Frontend Application
        run: npm run build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.deploy-backend.outputs.backend_url }}

      - name: Build and Push Frontend Docker Image
        run: |
          docker build -t gcr.io/${{ env.PROJECT_ID }}/baatkaro-frontend:latest ./frontend
          docker push gcr.io/${{ env.PROJECT_ID }}/baatkaro-frontend:latest

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy baatkaro-frontend \
            --image gcr.io/${{ env.PROJECT_ID }}/baatkaro-frontend:latest \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars BACKEND_API_URL=${{ needs.deploy-backend.outputs.backend_url }}
